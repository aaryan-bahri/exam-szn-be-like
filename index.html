<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Szn !!!</title>
    <style>
        /* Ensures padding and borders don't add to the width of elements */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Allows scrolling if content is taller than the screen */
            margin: 0;
            background-color: #1e1e2e;
            color: #cdd6f4;
            padding: 20px; /* Prevents the box from touching the screen edges on mobile */
        }
        .container {
            background-color: #313244;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;       /* Take up full available width... */
            max-width: 450px;  /* ...but stop growing at 450px */
        }
        /* New rules to constrain the crying cat image */
        .container img {
            max-width: 100%;     /* Never wider than the container */
            height: auto;        /* Maintain aspect ratio */
            max-height: 220px;   /* Cap the height so it doesn't dominate the screen */
            object-fit: contain; /* Ensures the whole image stays visible */
            border-radius: 8px;  /* Smooths the corners slightly */
            margin-bottom: 25px; /* Adds space between the image and the switches */
        }
        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            color: #f38ba8;
        }
        .switch-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
            margin: 0 auto;      /* Centers the flex-column block inside the container */
            width: fit-content;  /* Hugs the contents so the switches stay left-aligned to each other */
        }
        .toggle-row {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        /* The Switch - Basic CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            flex-shrink: 0; /* Prevents the switch from squishing on very narrow screens */
            margin-right: 15px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #585b70;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: #cdd6f4;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #a6e3a1;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="cryingcat.png" alt="CRYING CAT IMAGE">
    <div class="switch-container">
        <label class="toggle-row">
            <div class="switch">
                <input type="checkbox" class="dilemma-toggle">
                <span class="slider"></span>
            </div>
            Sleep
        </label>
        <label class="toggle-row">
            <div class="switch">
                <input type="checkbox" class="dilemma-toggle">
                <span class="slider"></span>
            </div>
            Eat
        </label>
        <label class="toggle-row">
            <div class="switch">
                <input type="checkbox" class="dilemma-toggle">
                <span class="slider"></span>
            </div>
            Pass DAA tomorrow
        </label>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('.dilemma-toggle');
    let activeSwitches = [];

    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            if (this.checked) {
                // Add to our active list
                activeSwitches.push(this);
                
                // If we now have 3 turned on, turn off the oldest one
                if (activeSwitches.length > 2) {
                    let switchToTurnOff = activeSwitches.shift(); // Removes and returns the first element
                    switchToTurnOff.checked = false;
                }
            } else {
                // If manually turned off, remove from the active list
                activeSwitches = activeSwitches.filter(item => item !== this);
            }
        });
    });
</script>

</body>
</html>
